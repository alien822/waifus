<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galería de Fotos</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    margin:20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.galeria{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:20px;
}

.tarjeta{
    background:#222;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,.4);
    display:flex;
    flex-direction:column;
    transition:transform .2s;
}

.tarjeta:hover{
    transform:scale(1.02);
}

.titulo{
    padding:12px;
    text-align:center;
}

.titulo h3{
    margin:0;
    font-size:18px;
}

.tarjeta img{
    width:100%;
    aspect-ratio:3/4;
    object-fit:cover;
    display:block;
}

.descripcion{
    padding:15px;
}

.descripcion p{
    margin:0;
    text-align:justify;
    line-height:1.4;
}

</style>

</head>
<body>

<h1>Galería de Fotos</h1>

<div id="galeria" class="galeria"></div>

<script>

const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvQr27eVKg3QWqUrPbgIlQCOSE5g7yBDF8T1Mix2pjqZcYDRJD7FnyKzB50M_EFlBtSZDBTUZe4uO3/pub?gid=0&single=true&output=csv";

async function cargarFotos(){

    try{

        const respuesta = await fetch(URL_CSV);
        const texto = await respuesta.text();

        const filas = texto.trim().split("\n");

        const galeria = document.getElementById("galeria");

        galeria.innerHTML = "";

        filas.slice(1).forEach(fila => {

            const columnas = fila.split(",");

            const titulo = columnas[0] || "";
            const imagen = columnas[1] || "";
            const descripcion = columnas[2] || "";

            galeria.innerHTML += `
                <div class="tarjeta">

                    <div class="titulo">
                        <h3>${titulo}</h3>
                    </div>

                    <img src="${imagen}" alt="${titulo}">

                    <div class="descripcion">
                        <p>${descripcion}</p>
                    </div>

                </div>
            `;
        });

    }catch(error){

        console.error("Error al cargar la hoja:", error);

        document.getElementById("galeria").innerHTML = `
            <p style="text-align:center;">
                No se pudieron cargar los datos.
            </p>
        `;
    }
}

cargarFotos();

</script>

</body>
</html>
